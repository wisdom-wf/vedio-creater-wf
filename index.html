<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" crossorigin="anonymous" />
  <script src="assets/js/gsap.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #0a0a0a;
    }
  </style>
</head>
<body>
<div
  data-composition-id="root"
  data-start="0"
  data-duration="347"
  data-width="1920"
  data-height="1080"
>
  <!-- Scenes sub-composition -->
  <div
    data-composition-id="scenes"
    data-composition-src="compositions/scenes.html"
    data-start="0"
    data-duration="347"
    data-track-index="1"
    data-width="1920"
    data-height="1080"
  ></div>

  <!-- Audio -->
  <audio
    id="main-audio"
    src="assets/audio/new-radio.mp3"
    data-composition-id="audio-main"
    data-start="0"
    data-duration="347"
    data-track-index="0"
  ></audio>
</div>

<script>
  window.__timelines = window.__timelines || {};
  // Root timeline: just advances through 321s, scenes control their own visibility
  var rootTl = gsap.timeline({ paused: true });
  rootTl.to({}, { duration: 347 });
  window.__timelines['root'] = rootTl;
</script>
</body>
</html>
