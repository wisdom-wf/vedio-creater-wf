      /* ═══════════════════════════════════════════════════════════════

         时间轴（秒）：基于 narration_script.txt 27段，手动对齐音频
      ═══════════════════════════════════════════════════════════════ */
      var SUB = [
        { s: 1.5,  e: 17.0, t: '欢迎来到红泥数智科技。我是王凡，一个在政企信息化领域深耕十六年的老兵。' },
        { s: 17.0, e: 45.0, t: '2008年西北工业大学软件工程专业毕业，我加入华为从一名软件工程师起步。' },
        { s: 45.0, e: 76.0, t: '离开华为后，2017年我加入海平方，从零组建算法团队。2018年出任宏崎达技术副总经理。' },
        { s: 76.0, e: 102.0, t: '2024年我创立红泥数智，专注AI加政务数字化。一支全新的团队，七个专业的AI Agent。' },
        { s: 102.0, e: 115.0, t: '十六年的积累让我有底气做这件事。一亿八千万的项目交付金额，三十五加的团队管理经验。' },
        { s: 115.0, e: 159.0, t: '第一，数据资产入表。我们成功完成了延安水务环保集团的数据资产入表项目，六家单位完成数据资产确权挂牌。' },
        { s: 159.0, e: 190.0, t: '第二，AI加政务数字化。吴起、志丹、宜川三个县域的智慧城市项目，总金额一亿八千万元。' },
        { s: 190.0, e: 230.0, t: '第三，AI咨询与培训。我们帮助十余家企业完成AI转型，培训五十多名技术人员。第四，产品技术顾问。' },
        { s: 230.0, e: 295.0, t: '红泥数智AI团队，七个专业Agent协同工作。战略官统筹全局，内容官负责文案，智囊提供分析建议，增长官负责增长。' },
        { s: 295.0, e: 347.0, t: '我是王凡，红泥数智创始人。AI加政务数字化专家，数据资产入表顾问。欢迎联系，期待与您的合作。' },
      ];

      /* 将字幕文字拆成字符span，插入#sub-text */
      function buildChars(text) {
        var el = document.getElementById('sub-text');
        el.innerHTML = '';
        for (var i = 0; i < text.length; i++) {
          var span = document.createElement('span');
          span.className = 'sub-char';
          span.dataset.idx = i;
          if (text[i] === ' ' || text[i] === '\u3000') {
            span.innerHTML = '';
            var sp = document.createElement('span');
            sp.className = 'sub-space';
            el.appendChild(sp);
          } else {
            el.appendChild(span);
          }
          span.textContent = text[i];
        }
      }

      /* 逐词高亮动画：按批次点亮字符 */
      function animateSubtitle(seg, idx) {
        var el = document.getElementById('sub-text');
        var chars = el.querySelectorAll ? el.querySelectorAll('.sub-char') : el.getElementsByClassName('sub-char');
        if (!chars || chars.length === 0) {
          /* 下一段 */
          if (idx + 1 < SUB.length) setTimeout(function() { animateSubtitle(SUB[idx+1], idx+1); }, (seg.e - seg.s) * 1000);
          return;
        }
        var total = chars.length;
        var BATCH = 4; /* 每批4个字符 */
        var batches = Math.ceil(total / BATCH);
        var segDur = Math.max(0.1, seg.e - seg.s - 0.6); /* 保留0.6s淡出 */
        var stepDur = segDur / batches;

        var stl = gsap.timeline({
          onComplete: function() {
            /* 淡出整句 */
            gsap.to('#sub-text', { opacity: 0, duration: 0.4, ease: 'power2.in', onComplete: function() {
              if (idx + 1 < SUB.length) animateSubtitle(SUB[idx+1], idx+1);
            }});
          }
        });

        /* 填入文字，淡入 */
        buildChars(seg.t);
        stl.set('#sub-text', { opacity: 0 });
        stl.to('#sub-text', { opacity: 1, duration: 0.3, ease: 'power2.out' });

        /* 逐批高亮 */
        for (var b = 0; b < batches; b++) {
          var from = b * BATCH;
          var to = Math.min(from + BATCH, total);
          var batchChars = [];
          for (var k = from; k < to; k++) {
            if (chars[k]) batchChars.push(chars[k]);
          }
          (function(ac) {
            stl.to(ac, {
              color: '#f5f5f5',
              fontWeight: '700',
              textShadow: '0 0 18px rgba(255,255,255,0.55)',
              duration: 0.12,
              ease: 'none',
              stagger: 0.025
            }, b * stepDur);
          })(batchChars);
        }

        /* 整句读完保持一点时间后淡出 */
        stl.to({}, { duration: segDur - batches * stepDur });
      }

      /* 等字幕元素就绪后启动（延迟0.5s确保DOM已挂载）*/
      setTimeout(function() {
        if (SUB.length > 0) animateSubtitle(SUB[0], 0);
      }, 500);

      window.__timelines = window.__timelines || {};
      window.__timelines['scenes'] = tl;
    }());
