<template id="scenes-template">
<div
  data-composition-id="scenes"
  data-width="1920"
  data-height="1080"
  data-duration="321"

  <style>
    /* ═══════════════════════════════════════════════════════════
       TOKENS & RESET
    ═══════════════════════════════════════════════════════════ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ═══════════════════════════════════════════════════════════
       BOTTOM BAR — 40px fixed, avatar + one-line quote
    ═══════════════════════════════════════════════════════════ */
    .s-bottom-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 100px;
      display: flex;
      align-items: center;
      padding: 0 40px;
      pointer-events: none;
      z-index: 100;
    }
        .s-quote-wrap {
      flex: 1;
      padding: 0 24px;
      overflow: hidden;
    }
    .s-quote-text {
      opacity: 0;
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: clamp(0.85rem, 1.4vw, 1.1rem);
      font-weight: 400;
      color: #E8C97A;
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ═══════════════════════════════════════════════════════════
       UPPER ZONE — 1040px, split 50/50 for content scenes
       Left + Right each: center children vertically, extend outward
    ═══════════════════════════════════════════════════════════ */
    .s-upper {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1040px;
    }

    /* 50/50 split containers */
    .s-left-zone,
    .s-right-zone {
      position: absolute;
      top: 0;
      height: 1040px;
      display: flex;
      flex-direction: column;
      justify-content: center; /* vertical center */
    }
    .s-left-zone  { left: 0;      width: 50%; padding: 0 64px 0 96px; }
    .s-right-zone { right: 0;     width: 50%; padding: 0 96px 0 64px; }

    /* Full-width container (photo scenes S1/S10) */
    .s-full-zone {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1040px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center; /* horizontal center */
    }

    /* ═══════════════════════════════════════════════════════════

    ═══════════════════════════════════════════════════════════ */

      background: radial-gradient(ellipse at 50% 40%, rgba(167,139,250,0.08) 0%, transparent 60%);

      top: 0; left: 0; right: 0;
      height: calc(100% - 100px);
      display: flex;
      z-index: 1;
    }
    #s1-left {
      width: 50%;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
    }
    #s1-right {
      width: 50%;
      position: relative; overflow: hidden;
    }
    #s1-photo {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain;
    }
    /* Left-zone content: centered */
    #s1-eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: clamp(0.75rem, 1.1vw, 1rem);
      font-weight: 500; color: #a78bfa;
      letter-spacing: 0.22em; text-transform: uppercase;
      margin-bottom: 18px; text-align: center;
    }
    #s1-title {
      font-family: 'Inter', sans-serif;
      font-size: clamp(3.5rem, 6vw, 5.5rem);
      font-weight: 900; color: #f5f5f5;

      margin-bottom: 20px; text-align: center;
    }

      width: 56px; height: 2px;
