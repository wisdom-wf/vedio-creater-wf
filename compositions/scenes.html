          var currentStart = entry.c[0] ? entry.c[0].s : entry.t;
          var lastPauseIdx = -1;

          for (var i = 0; i < entry.c.length; i++) {
            var wobj = entry.c[i];
            var ch = wobj.w;
            current.push({ wobj: wobj, globalIdx: i });
            currentChars++;

            var isLongPause = PAUSE_MARKERS.indexOf(ch) !== -1 && currentChars >= 4;
            var needsForceSplit = currentChars >= MAX_CHARS + 3;

            if (isLongPause || needsForceSplit) {
              var chunkEndTime = wobj.e;
              if (lastPauseIdx >= 0 && isLongPause) {
                /* 切在长标点前，把标点留给上句 */
                var lastW = current[current.length - 1].wobj;
                chunkEndTime = lastW.s + (lastW.e - lastW.s) * 0.5;
              }

              var chunkStartTime = current[0].wobj.s;
              var chunkEndGlobal = current[current.length - 1].globalIdx;
              chunks.push({
                text: current.map(function(it){ return it.wobj.w; }).join(''),
                t: chunkStartTime,
                e: chunkEndTime,
                words: current,
                subIdx: chunks.subIdx || 0
              });

              if (isLongPause && lastPauseIdx >= 0) {
                /* 标点独立成一行 */
                chunks.push({
                  text: ch,
                  t: chunkEndTime,
                  e: wobj.e,
                  words: [{ wobj: wobj, globalIdx: i }],
                  subIdx: chunks.subIdx || 0
                });
                current = [];
                currentChars = 0;
                lastPauseIdx = -1;
                currentStart = (entry.c[i+1] ? entry.c[i+1].s : wobj.e);
              } else {
                current = [];
                currentChars = 0;
                lastPauseIdx = -1;
                currentStart = (entry.c[i+1] ? entry.c[i+1].s : wobj.e);
              }
            } else {
              if (PAUSE_MARKERS.indexOf(ch) !== -1) lastPauseIdx = current.length - 1;
            }
          }

          /* 剩余不成段的字符 → 均分 MAX_CHARS 一组 */
          if (current.length > 0) {
            var remaining = [];
            var remChars = 0;
            for (var j = 0; j < current.length; j++) {
              remaining.push(current[j]);
              remChars++;
              if (remChars >= MAX_CHARS) {
                chunks.push({
                  text: remaining.map(function(it){ return it.wobj.w; }).join(''),
                  t: remaining[0].wobj.s,
                  e: remaining[remaining.length - 1].wobj.e,
                  words: remaining,
                  subIdx: chunks.subIdx || 0
                });
                remaining = [];
                remChars = 0;
              }
            }
            if (remaining.length > 0) {
              chunks.push({
                text: remaining.map(function(it){ return it.wobj.w; }).join(''),
                t: remaining[0].wobj.s,
                e: remaining[remaining.length - 1].wobj.e,
                words: remaining,
                subIdx: chunks.subIdx || 0
              });
            }
          }

          return chunks;
        }

        /* 预处理：把每个 SUB entry 拆成多个 chunk */
        var CHUNKS = [];
        for (var si = 0; si < SUB.length; si++) {
          var splits = splitSubEntry(SUB[si]);
          for (var ci = 0; ci < splits.length; ci++) {
            splits[ci].subIdx = si;
            splits[ci].chunkIdx = CHUNKS.length;
            CHUNKS.push(splits[ci]);
          }
        }
        window.__chunks = CHUNKS;
        console.log('[字幕] 共', CHUNKS.length, '个chunk', CHUNKS.map(function(c){ return c.text; }).join(' | '));

        /* DOM 构建：给定 chunk，构建其词级 span */
        function buildChunkSpans(chunk) {
          var el = document.getElementById('sub-text');
          el.innerHTML = '';
          el.style.opacity = '0';
          for (var i = 0; i < chunk.words.length; i++) {
            var wobj = chunk.words[i].wobj;
            var ch = wobj.w;
            if (ch.trim() === '') {
              var sp = document.createElement('span');
              sp.className = 'sub-space';
              el.appendChild(sp);
            } else {
              var span = document.createElement('span');
              span.id = 'cw-' + chunk.chunkIdx + '-' + i;
              span.className = 'sub-word';
              span.textContent = ch;
              el.appendChild(span);
            }
          }
        }

        /* 字幕动画：每个 chunk 逐词高亮 */
        function animateChunk(chunkIdx) {
          if (chunkIdx >= CHUNKS.length) return;
          var chunk = CHUNKS[chunkIdx];
          var el = document.getElementById('sub-text');

          buildChunkSpans(chunk);

          /* 字幕淡入 */
          gsap.to(el, { opacity: 1, duration: 0.25, ease: 'power1.out', overwrite: 'auto' }, chunk.t);

          /* 逐字高亮 */
          for (var i = 0; i < chunk.words.length; i++) {
            var wobj = chunk.words[i].wobj;
            if (wobj.w.trim() === '') continue;
            var wordId = '#cw-' + chunkIdx + '-' + i;
            gsap.to(wordId, {
              className: '+=lit',
              duration: 0.06,
              ease: 'none',
              overwrite: 'auto'
            }, wobj.s);
          }

          /* 字幕淡出（结束前0.15s） */
          var fadeTime = Math.max(chunk.t + 0.3, chunk.e - 0.15);
          gsap.to(el, { opacity: 0, duration: 0.2, ease: 'power1.in', overwrite: 'auto' }, fadeTime);

          /* 下一 chunk */
          var nextT = chunk.e + 0.05;
          gsap.to(el, {
            opacity: 0,
            duration: 0.01,
            overwrite: 'auto',
            onComplete: function() {
              el.innerHTML = '';
              el.className = '';
              animateChunk(chunkIdx + 1);
            }
          }, nextT);
        }

        /* 延迟0.5s确保DOM就绪后启动 */
        setTimeout(function() { animateChunk(0); }, 500);
      })();

      window.__timelines = window.__timelines || {};
      window.__timelines['scenes'] = tl;
    }());
  </script>
</div>
</template>
